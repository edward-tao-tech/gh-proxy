name: ghcr镜像构建

on:
  push:
    tags:
      - 'v*' # 当推送形如 v1.0.0 的标签时自动触发构建
  workflow_dispatch:
    inputs:
      version:
        description: '手动指定版本号 (例如: v1.0.0)，由tag触发时会自动忽略此项'
        required: false
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 增加 QEMU 支持，确保 ARM64 交叉编译的稳定性
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 统一处理版本号和镜像名称
      - name: Calculate Version and Image Name
        id: prep
        run: |
          # 转换为小写镜像库名称 (完美适配 edward-tao-tech/gh-proxy)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${REPO_LOWER}"
          
          # 判断是手动触发还是 Tag 推送触发
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_VERSION="${{ github.event.inputs.version }}"
            # 去除开头的 v
            if [[ $INPUT_VERSION == v* ]]; then
              VERSION=${INPUT_VERSION:1}
            else
              VERSION=$INPUT_VERSION
            fi
          else
            # 从 refs/tags/v1.0.0 中自动提取出 1.0.0
            TAG_VERSION="${{ github.ref_name }}"
            if [[ $TAG_VERSION == v* ]]; then
              VERSION=${TAG_VERSION:1}
            else
              VERSION=$TAG_VERSION
            fi
          fi
          
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          
          # 组装完整的 tags
          TAGS="${IMAGE_NAME}:${VERSION},${IMAGE_NAME}:latest"
          echo "TAGS=${TAGS}" >> $GITHUB_ENV

      # 使用官方的 build-push-action，原生支持 Github Action 缓存和多架构
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.TAGS }}
          build-args: |
            VERSION=${{ env.VERSION }}
          # 启用 GitHub Actions 原生缓存，大幅提升二次构建速度
          cache-from: type=gha
          cache-to: type=gha,mode=max
